<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="800" viewBox="0 0 1120 800" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect width="1120" height="800" fill="#ffffff"/>
  <rect x="0" y="0" width="1120" height="64" fill="#f3f1ec"/>
  <line x1="0" y1="64" x2="1120" y2="64" stroke="#e2ded4" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="8" fill="#d6d1c5"/>
  <circle cx="60" cy="32" r="8" fill="#d6d1c5"/>
  <circle cx="88" cy="32" r="8" fill="#d6d1c5"/>
  <rect x="300" y="14" width="520" height="36" rx="18" fill="#ffffff" stroke="#e2ded4"/>
  <text x="560" y="38" font-family="'SF Mono', Menlo, monospace" font-size="17" fill="#5b554c" text-anchor="middle">langgraph-chatbot.vercel.app</text>

  <text x="48" y="124" font-size="24" font-weight="600" fill="#18181b">LangGraph Chat</text>
  <rect x="952" y="96" width="120" height="42" rx="8" fill="#ffffff" stroke="#d4d4d8" stroke-width="1.5"/>
  <text x="1012" y="123" font-size="17" fill="#18181b" text-anchor="middle">New chat</text>
  <line x1="48" y1="160" x2="1072" y2="160" stroke="#f0eee8" stroke-width="1.5"/>

  <rect x="500" y="192" width="572" height="56" rx="16" fill="#18181b"/>
  <text x="528" y="227" font-size="19" fill="#fafafa">What is 23 × 17, plus the population of Tokyo?</text>

  <rect x="48" y="280" width="400" height="44" rx="10" fill="#f8f7f4" stroke="#e4e4e7"/>
  <text x="72" y="308" font-family="'SF Mono', Menlo, monospace" font-size="15" fill="#52525b">TOOL · calculator(23 × 17) → 391</text>

  <rect x="48" y="340" width="478" height="44" rx="10" fill="#f8f7f4" stroke="#e4e4e7"/>
  <text x="72" y="368" font-family="'SF Mono', Menlo, monospace" font-size="15" fill="#52525b">TOOL · web_search("Tokyo population")</text>

  <rect x="48" y="400" width="700" height="128" rx="16" fill="#f4f4f5"/>
  <text x="76" y="442" font-size="19" fill="#18181b">23 × 17 is 391. Tokyo's metro area is home to roughly</text>
  <text x="76" y="472" font-size="19" fill="#18181b">37 million people, so your grand total comes to</text>
  <text x="76" y="502" font-size="19" fill="#18181b">about 37,000,391.<tspan fill="#b3441a" font-weight="700">▍</tspan></text>

  <text x="48" y="580" font-size="16" fill="#a1a1aa" font-style="italic">…and it still remembers your name from yesterday's chat.</text>

  <rect x="48" y="640" width="880" height="60" rx="14" fill="#ffffff" stroke="#d4d4d8" stroke-width="1.5"/>
  <text x="76" y="678" font-size="18" fill="#a1a1aa">Message…</text>
  <rect x="948" y="640" width="124" height="60" rx="14" fill="#18181b"/>
  <text x="1010" y="678" font-size="18" fill="#fafafa" text-anchor="middle">Send</text>
</svg>
