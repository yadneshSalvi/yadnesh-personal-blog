<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="660" viewBox="0 0 1320 660">
  <rect width="1320" height="660" fill="#151311"/>
  <text x="56" y="74" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="14" letter-spacing="2.5" fill="#756d62">TWO HOMES &#183; ONE OF THEM NEVER SLEEPS</text>
  <rect x="56" y="246" width="300" height="168" rx="14" fill="#1d1a17" stroke="#2b2723" stroke-width="1.5"/>
  <text x="82" y="286" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="13" letter-spacing="1.5" fill="#756d62">THE BROWSER</text>
  <text x="82" y="326" font-family="Georgia, 'Times New Roman', serif" font-size="23" fill="#ebe7df">your visitor</text>
  <text x="82" y="362" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14.5" fill="#a49c90">loads the page,</text>
  <text x="82" y="384" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14.5" fill="#a49c90">then calls the API</text>
  <rect x="720" y="120" width="360" height="168" rx="14" fill="#1d1a17" stroke="#2b2723" stroke-width="1.5"/>
  <text x="748" y="162" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="13" letter-spacing="2" fill="#756d62">VERCEL &#183; THE FRONTEND</text>
  <text x="748" y="204" font-family="Georgia, 'Times New Roman', serif" font-size="24" fill="#ebe7df">just static files</text>
  <text x="748" y="240" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14.5" fill="#a49c90">copied onto a CDN, sitting close</text>
  <text x="748" y="262" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14.5" fill="#a49c90">to everyone, asleep until asked</text>
  <rect x="720" y="372" width="480" height="212" rx="14" fill="#1d1a17" stroke="#e5825a" stroke-width="2"/>
  <text x="748" y="412" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="13" letter-spacing="2" fill="#e5825a">FLY.IO &#183; THE BACKEND</text>
  <text x="748" y="450" font-family="Georgia, 'Times New Roman', serif" font-size="24" fill="#ebe7df">one machine, always awake</text>
  <rect x="746" y="470" width="428" height="78" rx="10" fill="#1b1815" stroke="#332e28" stroke-width="1.3"/>
  <text x="762" y="496" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="12" letter-spacing="1.5" fill="#756d62">IN MEMORY (RAM)</text>
  <rect x="762" y="508" width="72" height="28" rx="7" fill="#2a201a" stroke="#5e463a" stroke-width="1.3"/>
  <text x="798" y="527" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="13" font-weight="700" fill="#e5825a" text-anchor="middle">a1b2</text>
  <rect x="846" y="508" width="72" height="28" rx="7" fill="#211e1a" stroke="#2b2723" stroke-width="1.3"/>
  <text x="882" y="527" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="13" font-weight="700" fill="#756d62" text-anchor="middle">9f3c</text>
  <text x="1160" y="527" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13.5" fill="#a49c90" text-anchor="end">your chats live here</text>
  <line x1="362" y1="302" x2="703.3142997945654" y2="218.61071084564597" stroke="#a49c90" stroke-width="2.2"/>
  <path d="M 702.9141379841861 225.3996629389748 L 699.8287524393319 212.77110815073382 L 714 216 Z" fill="#a49c90"/>
  <text x="530" y="238" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="12.5" fill="#a49c90" text-anchor="middle">loads the app once</text>
  <line x1="362" y1="358" x2="703.5178164198542" y2="466.6647597699536" stroke="#e5825a" stroke-width="2.6"/>
  <path d="M 699.6411410875274 472.2523700254859 L 703.5827886321277 459.8643348853135 L 714 470 Z" fill="#e5825a"/>
  <text x="542" y="442" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="12.5" fill="#e5825a" text-anchor="middle">streams every message</text>
  <line x1="56" y1="600" x2="1264" y2="600" stroke="#2b2723" stroke-width="1.5"/>
  <text x="56" y="636" font-family="Georgia, 'Times New Roman', serif" font-size="19" fill="#a49c90">Vercel is only files, so a CDN works. The backend keeps your chats in memory, so it must be <tspan font-style="italic" fill="#e5825a">one machine that never sleeps</tspan>.</text>
</svg>