<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="360" viewBox="0 0 1040 360" font-family="'SF Mono', Menlo, Consolas, monospace">
  <rect width="1040" height="360" fill="#1a1816"/>
  <rect width="1040" height="48" fill="#211e1a"/>
  <circle cx="28" cy="24" r="7" fill="#3a3530"/>
  <circle cx="52" cy="24" r="7" fill="#3a3530"/>
  <circle cx="76" cy="24" r="7" fill="#3a3530"/>
  <text x="520" y="30" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="15" fill="#756d62" text-anchor="middle" letter-spacing="1">terminal &#183; backend</text>
  <g font-size="14.5" fill="#d8d2c6" xml:space="preserve">
    <text x="32" y="92" fill="#756d62"># set the keys ON the server, before the first deploy</text>
    <text x="32" y="124"><tspan fill="#8fb573">$</tspan> fly secrets set \</text>
    <text x="64" y="152">OPENAI_API_KEY=<tspan fill="#8fb573">sk-proj-...</tspan> \</text>
    <text x="64" y="180">TAVILY_API_KEY=<tspan fill="#8fb573">tvly-...</tspan></text>
    <text x="32" y="220" fill="#8fb573">Secrets are staged for the first deployment.</text>
    <text x="32" y="268" fill="#756d62"># stored encrypted on Fly, never in your image or git.</text>
    <text x="32" y="300" fill="#756d62"># chose Anthropic in Part 1? set ANTHROPIC_API_KEY instead.</text>
  </g>
</svg>