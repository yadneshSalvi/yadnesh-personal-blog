<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="520" viewBox="0 0 1040 520" font-family="'SF Mono', Menlo, Consolas, monospace">
  <rect width="1040" height="520" fill="#1a1816"/>
  <rect width="1040" height="48" fill="#211e1a"/>
  <circle cx="28" cy="24" r="7" fill="#3a3530"/>
  <circle cx="52" cy="24" r="7" fill="#3a3530"/>
  <circle cx="76" cy="24" r="7" fill="#3a3530"/>
  <text x="520" y="30" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="15" fill="#756d62" text-anchor="middle" letter-spacing="1">terminal &#183; backend</text>
  <g font-size="14.5" fill="#d8d2c6" xml:space="preserve">
    <text x="32" y="90" fill="#756d62"># from inside backend/, after fly launch --no-deploy</text>
    <text x="32" y="120"><tspan fill="#8fb573">$</tspan> fly deploy</text>
    <text x="32" y="156" fill="#756d62">==&gt; Building image with Docker</text>
    <text x="56" y="184">--&gt; pip install -r requirements.txt ... done</text>
    <text x="32" y="212" fill="#756d62">==&gt; Pushing image to fly</text>
    <text x="56" y="240">--&gt; image: registry.fly.io/langgraph-chatbot:deployment-01</text>
    <text x="32" y="268" fill="#756d62">==&gt; Creating release</text>
    <text x="32" y="296" fill="#756d62">--&gt; Monitoring deployment</text>
    <text x="56" y="324"><tspan fill="#8fb573">1 desired</tspan>, <tspan fill="#8fb573">1 placed</tspan>, <tspan fill="#8fb573">1 healthy</tspan> [&#10003;]</text>
    <text x="32" y="352">--&gt; v1 deployed successfully</text>
    <text x="32" y="406" fill="#756d62"># your backend is live on the public internet:</text>
    <text x="32" y="438">Visit your newly deployed app at</text>
    <text x="32" y="468" fill="#e5825a">https://langgraph-chatbot.fly.dev/</text>
  </g>
</svg>