<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="560" viewBox="0 0 1180 560">
  <rect width="1180" height="560" fill="#151311"/>

  <!-- tray in -->
  <text x="60" y="118" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="13" letter-spacing="1" fill="#756d62">THE TRAY GOES IN</text>
  <rect x="60" y="140" width="300" height="158" rx="12" fill="#1d1a17" stroke="#2b2723" stroke-width="1.5"/>
  <text x="84" y="174" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="12" letter-spacing="1.5" fill="#756d62">STATE · messages</text>
  <rect x="84" y="196" width="252" height="58" rx="8" fill="#211e1a" stroke="#2b2723" stroke-width="1.5"/>
  <text x="102" y="220" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="11" letter-spacing="2" fill="#756d62">HUMAN</text>
  <text x="102" y="242" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="15" fill="#ebe7df">"hello"</text>

  <line x1="372" y1="224" x2="461" y2="224" stroke="#a49c90" stroke-width="2"/>
  <path d="M 460 218 L 460 230 L 470 224 Z" fill="#a49c90"/>

  <!-- node -->
  <rect x="470" y="170" width="240" height="116" rx="12" fill="#1d1a17" stroke="#2b2723" stroke-width="1.5"/>
  <rect x="470" y="170" width="6" height="116" rx="3" fill="#e5825a"/>
  <text x="498" y="206" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="12" letter-spacing="2.5" fill="#756d62">NODE</text>
  <text x="498" y="240" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="26" font-weight="700" fill="#ebe7df">llm</text>
  <text x="498" y="268" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" fill="#a49c90">returns 1 new message</text>

  <line x1="710" y1="224" x2="799" y2="224" stroke="#a49c90" stroke-width="2"/>
  <path d="M 798 218 L 798 230 L 808 224 Z" fill="#a49c90"/>

  <!-- tray out -->
  <text x="808" y="118" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="13" letter-spacing="1" fill="#756d62">THE TRAY COMES OUT</text>
  <rect x="808" y="140" width="312" height="236" rx="12" fill="#1d1a17" stroke="#2b2723" stroke-width="1.5"/>
  <text x="832" y="174" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="12" letter-spacing="1.5" fill="#756d62">STATE · messages</text>
  <rect x="832" y="196" width="252" height="58" rx="8" fill="#211e1a" stroke="#2b2723" stroke-width="1.5"/>
  <text x="850" y="220" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="11" letter-spacing="2" fill="#756d62">HUMAN</text>
  <text x="850" y="242" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="15" fill="#ebe7df">"hello"</text>
  <rect x="832" y="270" width="252" height="58" rx="8" fill="#2a201a" stroke="#5e463a" stroke-width="1.5"/>
  <text x="850" y="294" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="11" letter-spacing="2" fill="#e5825a">AI</text>
  <text x="850" y="316" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="15" fill="#e5825a">"hi there"</text>
  <text x="832" y="356" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="12" fill="#e5825a">&#8593; new, appended (not replaced)</text>

  <!-- bottom band -->
  <line x1="60" y1="440" x2="1120" y2="440" stroke="#2b2723" stroke-width="1.5"/>
  <text x="60" y="486" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#ebe7df">The question <tspan font-style="italic" fill="#e5825a">survived</tspan>. That is the whole job of <tspan font-family="'SF Mono', Menlo, Consolas, monospace" font-size="19" fill="#ebe7df">add_messages</tspan>.</text>
  <text x="60" y="518" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" fill="#a49c90">A plain overwrite would have left only the AI reply, and thrown the user's words away.</text>
</svg>