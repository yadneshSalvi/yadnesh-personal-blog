<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620" font-family="'SF Mono', Menlo, Consolas, monospace">
  <rect width="1040" height="620" fill="#1a1816"/>
  <rect width="1040" height="48" fill="#211e1a"/>
  <circle cx="28" cy="24" r="7" fill="#3a3530"/>
  <circle cx="52" cy="24" r="7" fill="#3a3530"/>
  <circle cx="76" cy="24" r="7" fill="#3a3530"/>
  <text x="520" y="30" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="15" fill="#756d62" text-anchor="middle" letter-spacing="1">terminal &#183; backend</text>
  <g font-size="14.5" fill="#d8d2c6" xml:space="preserve">
    <text x="32" y="92"><tspan fill="#756d62">$</tspan> curl <tspan fill="#e5825a">-N</tspan> -X POST http://localhost:8000/chat \</text>
    <text x="32" y="120" fill="#d8d2c6">    -H "Content-Type: application/json" \</text>
    <text x="32" y="148" fill="#d8d2c6">    -d '{"message": "what is 23 * 17?"}'</text>
    <text x="32" y="190" fill="#756d62"># same belt as Part 5; two new labels ride it now</text>
    <text x="32" y="230"><tspan fill="#756d62">data:</tspan> {"type": <tspan fill="#6fa8dc">"tool_start"</tspan>, "name": <tspan fill="#8fb573">"calculator"</tspan>, "args": {"expression": "23 * 17"}}</text>
    <text x="32" y="260"><tspan fill="#756d62">data:</tspan> {"type": <tspan fill="#6fa8dc">"tool_end"</tspan>, "name": <tspan fill="#8fb573">"calculator"</tspan>, "result": <tspan fill="#8fb573">"391"</tspan>}</text>
    <text x="32" y="290"><tspan fill="#756d62">data:</tspan> {"type": <tspan fill="#6fa8dc">"tool_start"</tspan>, "name": <tspan fill="#8fb573">"tavily_search"</tspan>, "args": {"query": "population of Tokyo"}}</text>
    <text x="32" y="320"><tspan fill="#756d62">data:</tspan> {"type": <tspan fill="#6fa8dc">"tool_end"</tspan>, "name": <tspan fill="#8fb573">"tavily_search"</tspan>, "result": <tspan fill="#8fb573">"Tokyo: about 14 million..."</tspan>}</text>
    <text x="32" y="350"><tspan fill="#756d62">data:</tspan> {"type": <tspan fill="#c08fd6">"token"</tspan>, "content": <tspan fill="#8fb573">"23"</tspan>}</text>
    <text x="32" y="380"><tspan fill="#756d62">data:</tspan> {"type": <tspan fill="#c08fd6">"token"</tspan>, "content": <tspan fill="#8fb573">" × 17"</tspan>}</text>
    <text x="32" y="410"><tspan fill="#756d62">data:</tspan> {"type": <tspan fill="#c08fd6">"token"</tspan>, "content": <tspan fill="#8fb573">" is"</tspan>}</text>
    <text x="32" y="440"><tspan fill="#756d62">data:</tspan> {"type": <tspan fill="#c08fd6">"token"</tspan>, "content": <tspan fill="#8fb573">" 391,"</tspan>}</text>
    <text x="32" y="470"><tspan fill="#756d62">data:</tspan> {"type": <tspan fill="#c08fd6">"done"</tspan>}</text>
    
  </g>
</svg>