<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="463" viewBox="0 0 1120 463" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect width="1120" height="463" fill="#f5f5f4"/>

  <!-- browser chrome -->
  <rect x="0" y="0" width="1120" height="64" fill="#f3f1ec"/>
  <line x1="0" y1="64" x2="1120" y2="64" stroke="#e2ded4" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="8" fill="#d6d1c5"/><circle cx="60" cy="32" r="8" fill="#d6d1c5"/><circle cx="88" cy="32" r="8" fill="#d6d1c5"/>
  <rect x="300" y="14" width="520" height="36" rx="18" fill="#ffffff" stroke="#e2ded4"/>
  <text x="560" y="38" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="17" fill="#5b554c" text-anchor="middle">localhost:3000</text>

  <!-- chat card -->
  <rect x="200" y="98" width="720" height="331" rx="16" fill="#ffffff" stroke="#e7e5e4" stroke-width="1.5"/>
  <text x="228" y="139" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="19" font-weight="700" fill="#1c1917">Chatbot</text>
  <line x1="200" y1="164" x2="920" y2="164" stroke="#eceae8" stroke-width="1.5"/>
  
  <rect x="720" y="190" width="172" height="47" rx="16" fill="#1c1917"/>
  <text x="738" y="219" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" fill="#fafaf9">What is 23 × 17?</text>
  <rect x="228" y="253" width="200" height="66" rx="12" fill="#fbfaf8" stroke="#d6d3d1" stroke-width="1.5" stroke-dasharray="5 4"/>
  <rect x="229" y="263" width="3" height="46" rx="1.5" fill="#b3441a"/>
  <text x="254" y="279" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="14" fill="#1c1917"><tspan font-weight="700" fill="#b3441a">calculator</tspan>(23 * 17)</text>
  <text x="254" y="301" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="14" fill="#b3441a">running...</text>
  <circle cx="406" cy="304" r="4" fill="#b3441a"/>

  <!-- footer: input + send/stop -->
  <line x1="200" y1="341" x2="920" y2="341" stroke="#eceae8" stroke-width="1.5"/>
  <rect x="224" y="365" width="580" height="44" rx="10" fill="#ffffff" stroke="#e7e5e4" stroke-width="1.5"/>
  <text x="242" y="393" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" fill="#a8a29e">Ask me anything...</text>
  <rect x="820" y="365" width="76" height="44" rx="10" fill="#1c1917"/>
  <text x="858" y="393" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#fafaf9" text-anchor="middle">Send</text>
</svg>