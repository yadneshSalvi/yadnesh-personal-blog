<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="560" viewBox="0 0 1180 560">
  <rect width="1180" height="560" fill="#faf9f6"/>

  <!-- left: the browser -->
  <rect x="70" y="150" width="360" height="200" rx="14" fill="#f1efe9" stroke="#e7e3d9" stroke-width="1.5"/>
  <text x="98" y="188" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="13" letter-spacing="2" fill="#8f887a">BROWSER &#183; localhost:3000</text>
  <rect x="98" y="210" width="304" height="44" rx="10" fill="#f6e7df" stroke="#dcb09a" stroke-width="1.5"/>
  <text x="114" y="238" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" fill="#b3441a">"Explain recursion."</text>
  <rect x="98" y="268" width="240" height="36" rx="8" fill="#ffffff" stroke="#e7e3d9" stroke-width="1.5"/>
  <text x="114" y="291" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" fill="#8f887a">type a message...</text>
  <rect x="346" y="268" width="56" height="36" rx="8" fill="#1f1c19"/>
  <text x="374" y="291" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#faf9f6" text-anchor="middle">Send</text>
  <text x="98" y="334" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="12.5" fill="#5b554c">useState: messages, input</text>

  <!-- right: the server -->
  <rect x="750" y="150" width="360" height="200" rx="14" fill="#f1efe9" stroke="#e7e3d9" stroke-width="1.5"/>
  <rect x="750" y="150" width="6" height="200" rx="3" fill="#b3441a"/>
  <text x="780" y="188" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="13" letter-spacing="2" fill="#8f887a">SERVER &#183; localhost:8000</text>
  <text x="780" y="234" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="20" font-weight="700" fill="#1f1c19">POST /chat</text>
  <text x="780" y="268" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="15" fill="#5b554c">graph.invoke(...)</text>
  <text x="780" y="306" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" fill="#5b554c">the one-node LangGraph,</text>
  <text x="780" y="328" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" fill="#5b554c">calling a real model (Part 3)</text>

  <!-- request arrow (top) -->
  <line x1="438" y1="214" x2="733" y2="214" stroke="#b3441a" stroke-width="2.5"/>
  <path d="M 732 208 L 732 220 L 742 214 Z" fill="#b3441a"/>
  <text x="590" y="194" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="13.5" fill="#b3441a" text-anchor="middle">fetch( /chat )</text>
  <text x="590" y="238" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="12.5" fill="#8f887a" text-anchor="middle">{ message }</text>

  <!-- response arrow (bottom) -->
  <line x1="742" y1="300" x2="447" y2="300" stroke="#5b554c" stroke-width="2.5"/>
  <path d="M 448 294 L 448 306 L 438 300 Z" fill="#5b554c"/>
  <text x="590" y="288" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="12.5" fill="#8f887a" text-anchor="middle">200 OK</text>
  <text x="590" y="326" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="13.5" fill="#1f1c19" text-anchor="middle">{ reply }</text>

  <!-- bottom band -->
  <line x1="70" y1="430" x2="1110" y2="430" stroke="#e7e3d9" stroke-width="1.5"/>
  <text x="70" y="476" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#1f1c19">Your click sends the words out; the reply <tspan font-style="italic" fill="#b3441a">rides back</tspan> and becomes a bubble.</text>
  <text x="70" y="508" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" fill="#5b554c">Same trip as your Part 2 curl, except a browser makes it now, and React paints the answer on screen.</text>
</svg>