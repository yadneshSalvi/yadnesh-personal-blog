<svg xmlns="http://www.w3.org/2000/svg" width="1314" height="660" viewBox="0 0 1314 660">
  <rect width="1314" height="660" fill="#faf9f6"/>
  <text x="56" y="80" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="14" letter-spacing="2.5" fill="#8f887a">THREADS &#183; THE ID IS THE LABEL ON THE NOTEBOOK</text>
  <rect x="56" y="196" width="360" height="234" rx="14" fill="#f1efe9" stroke="#e7e3d9" stroke-width="1.5"/>
  <text x="82" y="234" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="13" letter-spacing="1.5" fill="#8f887a">THE REQUEST</text>
  <text x="82" y="282" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="16" fill="#5b554c">POST /chat</text>
  <text x="82" y="318" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="15" fill="#1f1c19">{</text>
  <text x="98" y="346" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="15" fill="#1f1c19">"message": "What's my name?",</text>
  <text x="98" y="374" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="15" fill="#1f1c19">"thread_id": <tspan font-weight="700" fill="#b3441a">"a1b2"</tspan></text>
  <text x="82" y="402" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="15" fill="#1f1c19">}</text>
  <rect x="534" y="250" width="188" height="124" rx="14" fill="#f1efe9" stroke="#e7e3d9" stroke-width="1.5"/>
  <text x="628" y="290" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="13" letter-spacing="1.5" fill="#8f887a" text-anchor="middle">THE GRAPH</text>
  <text x="628" y="328" font-family="Georgia, 'Times New Roman', serif" font-size="20" fill="#1f1c19" text-anchor="middle">llm + tools</text>
  <text x="628" y="354" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#5b554c" text-anchor="middle">runs as before</text>
  <rect x="840" y="132" width="418" height="408" rx="16" fill="#efece4" stroke="#ddd8cc" stroke-width="1.5"/>
  <text x="866" y="168" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="13" letter-spacing="2" fill="#8f887a">THE CHECKPOINTER</text>
  <rect x="866" y="202" width="366" height="116" rx="10" fill="#f6e7df" stroke="#b3441a" stroke-width="2.5"/>
  <rect x="882" y="190" width="78" height="26" rx="7" fill="#b3441a" stroke="#b3441a" stroke-width="1.2"/>
  <text x="921" y="208" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">a1b2</text>
  <text x="888" y="242" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="13.5" fill="#1f1c19"><tspan fill="#b3441a">you</tspan>  My name is Alex.</text>
  <text x="888" y="266" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="13.5" fill="#1f1c19"><tspan fill="#4f7a46">bot</tspan>  Nice to meet you, Alex.</text>
  <text x="888" y="290" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="13.5" fill="#1f1c19"><tspan fill="#b3441a">you</tspan>  What's my name?</text>
  <rect x="866" y="348" width="366" height="68" rx="10" fill="#ffffff" stroke="#e7e3d9" stroke-width="1.3"/>
  <rect x="882" y="336" width="78" height="26" rx="7" fill="#f1efe9" stroke="#e7e3d9" stroke-width="1.2"/>
  <text x="921" y="354" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="13" font-weight="700" fill="#5b554c" text-anchor="middle">9f3c</text>
  <text x="888" y="388" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="13.5" fill="#8f887a"><tspan fill="#b3441a">you</tspan>  a different conversation</text>
  <rect x="866" y="442" width="366" height="68" rx="10" fill="#ffffff" stroke="#e7e3d9" stroke-width="1.3"/>
  <rect x="882" y="430" width="78" height="26" rx="7" fill="#f1efe9" stroke="#e7e3d9" stroke-width="1.2"/>
  <text x="921" y="448" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="13" font-weight="700" fill="#5b554c" text-anchor="middle">c7d0</text>
  <text x="888" y="482" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="13.5" fill="#8f887a"><tspan fill="#b3441a">you</tspan>  another one, kept apart</text>
  <text x="475" y="296" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="12.5" fill="#b3441a" text-anchor="middle">carries the id</text>
  <line x1="424" y1="312" x2="517" y2="312" stroke="#b3441a" stroke-width="2.5"/>
  <path d="M 516 306 L 516 318 L 526 312 Z" fill="#b3441a"/>
  <line x1="730" y1="312" x2="823" y2="312" stroke="#b3441a" stroke-width="2.5"/>
  <path d="M 822 306 L 822 318 L 832 312 Z" fill="#b3441a"/>
  <text x="781" y="296" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="12.5" fill="#b3441a" text-anchor="middle">opens a1b2</text>
  <text x="781" y="338" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="12.5" fill="#4f7a46" text-anchor="middle">reads &amp; writes</text>
  <line x1="56" y1="600" x2="1258" y2="600" stroke="#e7e3d9" stroke-width="1.5"/>
  <text x="56" y="636" font-family="Georgia, 'Times New Roman', serif" font-size="19" fill="#5b554c">Same <tspan font-style="italic" fill="#b3441a">thread_id</tspan>, same notebook, same memory. A brand-new id opens a blank page and the bot starts fresh.</text>
</svg>