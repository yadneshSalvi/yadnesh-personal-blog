<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="600" viewBox="0 0 1240 600">
  <rect width="1240" height="600" fill="#faf9f6"/>

  <text x="60" y="92" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="14" letter-spacing="2.5" fill="#8f887a">THE STREAM, END TO END</text>

  <rect x="60" y="176" width="270" height="220" rx="14" fill="#f1efe9" stroke="#e7e3d9" stroke-width="1.5"/>
  <rect x="60" y="176" width="6" height="220" rx="3" fill="#b3441a"/>
  <text x="90" y="216" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="13" letter-spacing="2" fill="#8f887a">THE MODEL</text>
  <text x="90" y="256" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="18" font-weight="700" fill="#1f1c19">astream_events</text>
  <text x="90" y="288" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14.5" fill="#5b554c">plates one word the</text>
  <text x="90" y="310" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14.5" fill="#5b554c">instant it is ready,</text>
  <text x="90" y="332" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14.5" fill="#5b554c">not the whole dish</text>
  <rect x="88" y="352" width="214" height="30" rx="8" fill="#f6e7df" stroke="#dcb09a" stroke-width="1.2"/>
  <text x="195" y="372" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="13" fill="#b3441a" text-anchor="middle">on_chat_model_stream</text>
  <rect x="366" y="256" width="518" height="60" rx="30" fill="#efece4" stroke="#ddd8cc" stroke-width="1.5"/>
  <circle cx="366" cy="286" r="27" fill="none" stroke="#ddd8cc" stroke-width="1.5"/>
  <circle cx="884" cy="286" r="27" fill="none" stroke="#ddd8cc" stroke-width="1.5"/><path d="M 426 332 l 8 6 l -8 6" fill="none" stroke="#8f887a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M 512 332 l 8 6 l -8 6" fill="none" stroke="#8f887a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M 598 332 l 8 6 l -8 6" fill="none" stroke="#8f887a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M 684 332 l 8 6 l -8 6" fill="none" stroke="#8f887a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M 770 332 l 8 6 l -8 6" fill="none" stroke="#8f887a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><text x="625" y="234" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="13" letter-spacing="1.5" fill="#8f887a" text-anchor="middle">ONE BELT &#183; text/event-stream</text>
  <rect x="386.4" y="257" width="104" height="58" rx="7" fill="#ffffff" stroke="#dcb09a" stroke-width="1.5"/>
  <path d="M 390.4 263 L 438.4 284 L 486.4 263" fill="none" stroke="#dcb09a" stroke-width="1.5"/>
  <text x="438.4" y="302" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="15" font-weight="700" fill="#b3441a" text-anchor="middle">"Re"</text><text x="500.59999999999997" y="354" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="13" fill="#8f887a" text-anchor="middle">\n\n</text><rect x="510.79999999999995" y="257" width="104" height="58" rx="7" fill="#ffffff" stroke="#dcb09a" stroke-width="1.5"/>
  <path d="M 514.8 263 L 562.8 284 L 610.8 263" fill="none" stroke="#dcb09a" stroke-width="1.5"/>
  <text x="562.8" y="302" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="15" font-weight="700" fill="#b3441a" text-anchor="middle">"cursion"</text><text x="625" y="354" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="13" fill="#8f887a" text-anchor="middle">\n\n</text><rect x="635.2" y="257" width="104" height="58" rx="7" fill="#ffffff" stroke="#dcb09a" stroke-width="1.5"/>
  <path d="M 639.2 263 L 687.2 284 L 735.2 263" fill="none" stroke="#dcb09a" stroke-width="1.5"/>
  <text x="687.2" y="302" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="15" font-weight="700" fill="#b3441a" text-anchor="middle">"is"</text><text x="749.4000000000001" y="354" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="13" fill="#8f887a" text-anchor="middle">\n\n</text><rect x="759.6" y="257" width="104" height="58" rx="7" fill="#ffffff" stroke="#dcb09a" stroke-width="1.5"/>
  <path d="M 763.6 263 L 811.6 284 L 859.6 263" fill="none" stroke="#dcb09a" stroke-width="1.5"/>
  <text x="811.6" y="302" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="15" font-weight="700" fill="#b3441a" text-anchor="middle">"when"</text><text x="366" y="376" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13.5" fill="#5b554c">each parcel is a labeled envelope; the blank line marks where one ends</text>
  <rect x="912" y="176" width="268" height="220" rx="14" fill="#f1efe9" stroke="#e7e3d9" stroke-width="1.5"/>
  <text x="940" y="216" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="13" letter-spacing="2" fill="#8f887a">THE BROWSER</text>
  <text x="940" y="254" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="16" font-weight="700" fill="#1f1c19">body.getReader()</text>
  <text x="940" y="280" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" fill="#5b554c">cuts on the blank line,</text>
  <text x="940" y="300" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" fill="#5b554c">opens each parcel</text>
  <rect x="940" y="322" width="212" height="50" rx="14" fill="#f6e7df"/>
  <text x="958" y="353" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" fill="#b3441a">Recursion is when<tspan font-weight="700">&#9615;</tspan></text>

  <!-- feed arrows -->
  <line x1="336" y1="286" x2="353" y2="286" stroke="#b3441a" stroke-width="2.5"/>
  <path d="M 352 280 L 352 292 L 362 286 Z" fill="#b3441a"/>
  <line x1="888" y1="286" x2="897" y2="286" stroke="#b3441a" stroke-width="2.5"/>
  <path d="M 896 280 L 896 292 L 906 286 Z" fill="#b3441a"/>

  <line x1="60" y1="476" x2="1180" y2="476" stroke="#e7e3d9" stroke-width="1.5"/>
  <text x="60" y="514" font-family="Georgia, 'Times New Roman', serif" font-size="21" fill="#1f1c19">The model plates each word at the pass; the belt carries it over; the bubble <tspan font-style="italic" fill="#b3441a">grows a word at a time</tspan>.</text>
  <text x="60" y="544" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14.5" fill="#5b554c">In Part 6 the tools ride this same belt. A new label on the parcel, and the reader you wrote already knows what to do with it.</text>
</svg>